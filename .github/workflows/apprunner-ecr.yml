name: Deploy to App Runner

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: augmentedplay
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t "$ECR_REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}" .
          docker tag "$ECR_REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}" "$ECR_REGISTRY/${ECR_REPOSITORY}:${GITHUB_SHA}"
          docker push "$ECR_REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker push "$ECR_REGISTRY/${ECR_REPOSITORY}:${GITHUB_SHA}"

      - name: Trigger App Runner deployment
        env:
          APP_RUNNER_SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
          APP_RUNNER_ACCESS_ROLE_ARN: ${{ secrets.APP_RUNNER_ACCESS_ROLE_ARN }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          STATUS=$(aws apprunner describe-service \
            --service-arn "$APP_RUNNER_SERVICE_ARN" \
            --region "$AWS_REGION" \
            --query "Service.Status" \
            --output text 2>/dev/null || echo "DELETED")

          echo "App Runner service status: $STATUS"

          if [ "$STATUS" = "DELETED" ]; then
            echo "Service is deleted, recreating..."
            NEW_ARN=$(aws apprunner create-service \
              --service-name biokassa \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}\",
                  \"ImageConfiguration\": {\"Port\": \"5000\"},
                  \"ImageRepositoryType\": \"ECR\"
                },
                \"AutoDeploymentsEnabled\": false,
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"${APP_RUNNER_ACCESS_ROLE_ARN}\"
                }
              }" \
              --region "$AWS_REGION" \
              --query "Service.ServiceArn" \
              --output text)

            echo "New service ARN: $NEW_ARN"
            echo "⚠️  Update the APP_RUNNER_SERVICE_ARN secret in GitHub to: $NEW_ARN"

            echo "Waiting for new service to reach RUNNING state..."
            aws apprunner wait service-running \
              --service-arn "$NEW_ARN" \
              --region "$AWS_REGION"

            SERVICE_ARN="$NEW_ARN"

          elif [ "$STATUS" = "PAUSED" ]; then
            echo "Service is paused, resuming..."
            aws apprunner resume-service \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --region "$AWS_REGION"

            echo "Waiting for service to reach RUNNING state..."
            aws apprunner wait service-running \
              --service-arn "$APP_RUNNER_SERVICE_ARN" \
              --region "$AWS_REGION"

            SERVICE_ARN="$APP_RUNNER_SERVICE_ARN"

          else
            SERVICE_ARN="$APP_RUNNER_SERVICE_ARN"
          fi

          echo "Starting deployment..."
          aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --region "$AWS_REGION"
