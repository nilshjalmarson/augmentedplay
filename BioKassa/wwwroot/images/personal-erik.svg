<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde047"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fddcb5"/>
      <stop offset="100%" stop-color="#d4895a"/>
    </radialGradient>
    <linearGradient id="hair" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#6b2d0a"/>
    </linearGradient>
    <!-- Färgglad tröja med ränder -->
    <linearGradient id="troja" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="33%" stop-color="#a855f7"/>
      <stop offset="66%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Färgglad randig tröja -->
  <path d="M18 100 Q20 73 44 70 L44 75 Q50 78 56 75 L56 70 Q80 73 82 100 Z" fill="url(#troja)"/>
  <!-- Tröjans krage (rund) -->
  <path d="M43 70 Q50 75 57 70" stroke="#f97316" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Hals -->
  <path d="M44 69 Q50 72 56 69 L55 62 Q50 64 45 62 Z" fill="url(#skin)"/>

  <!-- Huvud -->
  <ellipse cx="50" cy="47" rx="20" ry="22" fill="url(#skin)"/>

  <!-- Lockigt hår -->
  <!-- Bas -->
  <ellipse cx="50" cy="28" rx="22" ry="14" fill="url(#hair)"/>
  <!-- Lockar på toppen -->
  <circle cx="38" cy="24" r="7" fill="url(#hair)"/>
  <circle cx="46" cy="20" r="7" fill="url(#hair)"/>
  <circle cx="54" cy="20" r="7" fill="url(#hair)"/>
  <circle cx="62" cy="24" r="7" fill="url(#hair)"/>
  <!-- Lockar på sidorna -->
  <circle cx="30" cy="34" r="6" fill="url(#hair)"/>
  <circle cx="70" cy="34" r="6" fill="url(#hair)"/>
  <circle cx="28" cy="44" r="5" fill="url(#hair)"/>
  <circle cx="72" cy="44" r="5" fill="url(#hair)"/>
  <!-- Extra lockar för volym -->
  <circle cx="34" cy="28" r="6" fill="url(#hair)"/>
  <circle cx="66" cy="28" r="6" fill="url(#hair)"/>
  <!-- Hårglans -->
  <path d="M36 22 C42 17 58 17 64 22" stroke="#b45309" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Ögonbryn (uppdragna, glada) -->
  <path d="M33 40 C35 37 40 37 43 39" stroke="#6b2d0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M57 39 C60 37 65 37 67 40" stroke="#6b2d0a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Ögon (stora och glada) -->
  <ellipse cx="38" cy="44" rx="5" ry="5.5" fill="white"/>
  <circle cx="38" cy="44" r="3.5" fill="#16a34a"/>
  <circle cx="38" cy="44" r="2" fill="#14532d"/>
  <circle cx="39.5" cy="42.5" r="1" fill="white"/>

  <ellipse cx="62" cy="44" rx="5" ry="5.5" fill="white"/>
  <circle cx="62" cy="44" r="3.5" fill="#16a34a"/>
  <circle cx="62" cy="44" r="2" fill="#14532d"/>
  <circle cx="63.5" cy="42.5" r="1" fill="white"/>

  <!-- Skrattrynkor vid ögonen -->
  <path d="M43 42 C45 41 46 41 47 42" stroke="#d4895a" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M53 42 C54 41 55 41 57 42" stroke="#d4895a" stroke-width="0.7" fill="none" opacity="0.5"/>

  <!-- Näsa -->
  <path d="M47 53 C48 55 52 55 53 53" stroke="#d4895a" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <!-- Näsvingar -->
  <circle cx="46" cy="54" r="1.5" fill="#d4895a" opacity="0.3"/>
  <circle cx="54" cy="54" r="1.5" fill="#d4895a" opacity="0.3"/>

  <!-- Stort leende med tänder -->
  <path d="M36 60 C39 66 61 66 64 60 C61 70 39 70 36 60 Z" fill="#1a1a1a"/>
  <path d="M36 60 C39 65 61 65 64 60 C61 63 39 63 36 60 Z" fill="white"/>
  <!-- Tandgränser -->
  <line x1="43" y1="60" x2="43" y2="63" stroke="#e5e7eb" stroke-width="0.6"/>
  <line x1="50" y1="60" x2="50" y2="64" stroke="#e5e7eb" stroke-width="0.6"/>
  <line x1="57" y1="60" x2="57" y2="63" stroke="#e5e7eb" stroke-width="0.6"/>

  <!-- Kindrosor (glada, stora) -->
  <ellipse cx="28" cy="53" rx="7" ry="5" fill="#fda4af" opacity="0.5"/>
  <ellipse cx="72" cy="53" rx="7" ry="5" fill="#fda4af" opacity="0.5"/>

  <!-- Fräknar (glad kille) -->
  <circle cx="32" cy="51" r="1" fill="#d4895a" opacity="0.5"/>
  <circle cx="35" cy="54" r="0.8" fill="#d4895a" opacity="0.4"/>
  <circle cx="68" cy="51" r="1" fill="#d4895a" opacity="0.5"/>
  <circle cx="65" cy="54" r="0.8" fill="#d4895a" opacity="0.4"/>

  <!-- Namnbricka -->
  <rect x="30" y="84" width="40" height="12" rx="6" fill="#f97316"/>
  <text x="50" y="93.5" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="sans-serif">Erik</text>
</svg>
