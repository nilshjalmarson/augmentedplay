<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fddcb5"/>
      <stop offset="100%" stop-color="#d4895a"/>
    </radialGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f5e6a3"/>
      <stop offset="100%" stop-color="#d4b44a"/>
    </linearGradient>
    <linearGradient id="jacket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2d2d2d"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Skinjacka -->
  <path d="M18 100 Q20 72 50 70 Q80 72 82 100 Z" fill="url(#jacket)"/>
  <!-- Jackans krage (lapels) -->
  <path d="M50 70 L40 78 L35 100" fill="#111111"/>
  <path d="M50 70 L60 78 L65 100" fill="#111111"/>
  <!-- Jackans dragkedja -->
  <line x1="50" y1="70" x2="50" y2="100" stroke="#555" stroke-width="1.2"/>
  <rect x="48.5" y="74" width="3" height="2" rx="0.5" fill="#888"/>
  <rect x="48.5" y="79" width="3" height="2" rx="0.5" fill="#888"/>
  <rect x="48.5" y="84" width="3" height="2" rx="0.5" fill="#888"/>
  <!-- Jackans sömmar -->
  <path d="M20 82 Q35 78 40 78" stroke="#333" stroke-width="1" fill="none"/>
  <path d="M80 82 Q65 78 60 78" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Hals -->
  <path d="M44 70 Q50 73 56 70 L55 63 Q50 65 45 63 Z" fill="url(#skin)"/>

  <!-- Huvud -->
  <ellipse cx="50" cy="48" rx="21" ry="23" fill="url(#skin)"/>

  <!-- Blont hår (naturligt, lite ostadigt) -->
  <ellipse cx="50" cy="30" rx="21" ry="12" fill="url(#hair)"/>
  <!-- Sidohår vänster -->
  <path d="M29 38 C27 33 28 27 31 29 C30 33 30 40 31 45 Z" fill="url(#hair)"/>
  <!-- Sidohår höger -->
  <path d="M71 38 C73 33 72 27 69 29 C70 33 70 40 69 45 Z" fill="url(#hair)"/>
  <!-- Framhår (naturlig stil) -->
  <path d="M30 38 C32 28 40 24 50 25 C60 24 68 28 70 38 C64 33 55 31 50 31 C45 31 36 33 30 38 Z" fill="url(#hair)"/>
  <!-- Lite lugg åt sidan -->
  <path d="M34 32 C38 27 46 25 52 27 C46 26 39 28 34 32 Z" fill="#e8d470" opacity="0.6"/>

  <!-- Ögonbryn (raka, lite tjocka) -->
  <path d="M37 42 L46 42" stroke="#a08020" stroke-width="2" stroke-linecap="round"/>
  <path d="M54 42 L63 42" stroke="#a08020" stroke-width="2" stroke-linecap="round"/>

  <!-- Ögon -->
  <path d="M37 47 C38 44 43 44 45 47 C43 50 38 50 37 47 Z" fill="white"/>
  <circle cx="41" cy="47" r="2.8" fill="#3b82f6"/>
  <circle cx="41" cy="47" r="1.6" fill="#1e3a5f"/>
  <circle cx="42" cy="46" r="0.7" fill="white"/>

  <path d="M55 47 C56 44 61 44 63 47 C61 50 56 50 55 47 Z" fill="white"/>
  <circle cx="59" cy="47" r="2.8" fill="#3b82f6"/>
  <circle cx="59" cy="47" r="1.6" fill="#1e3a5f"/>
  <circle cx="60" cy="46" r="0.7" fill="white"/>

  <!-- Näsa -->
  <path d="M48 54 C49 56 51 56 52 54" stroke="#c8885a" stroke-width="0.9" fill="none" stroke-linecap="round"/>

  <!-- Mun (avslappnat cool) -->
  <path d="M43 62 C46 63 54 63 57 62" stroke="#b06040" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Öra vänster (med hål/piercing) -->
  <path d="M29 46 C27 43 27 53 29 54" stroke="#c8885a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Piercing ring -->
  <circle cx="27.5" cy="53" r="3" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="27.5" cy="56" r="1" fill="#aaa"/>

  <!-- Öra höger -->
  <path d="M71 46 C73 43 73 53 71 54" stroke="#c8885a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tatueringar på halsen -->
  <!-- Enkel stjärna/symbol -->
  <text x="57" y="68" font-size="6" fill="#555" opacity="0.8">★</text>
  <!-- Linje-tatuering -->
  <path d="M38 67 C40 65 43 66 42 68" stroke="#666" stroke-width="0.8" fill="none" opacity="0.7"/>

  <!-- Tatuering på arm (syns lite vid jackkanten) -->
  <path d="M22 85 C24 82 26 81 27 83" stroke="#555" stroke-width="1" fill="none" opacity="0.8"/>
  <path d="M23 88 C25 85 27 85 27 87" stroke="#555" stroke-width="0.8" fill="none" opacity="0.7"/>

  <!-- Namnbricka -->
  <rect x="28" y="82" width="44" height="13" rx="6.5" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="50" y="92.5" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="sans-serif">Benjamin</text>
</svg>
