<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fff0f6"/>
      <stop offset="100%" stop-color="#fcd5e8"/>
    </radialGradient>
    <radialGradient id="skin" cx="48%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#feebd4"/>
      <stop offset="100%" stop-color="#f0b887"/>
    </radialGradient>
    <linearGradient id="hair" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e27a"/>
      <stop offset="100%" stop-color="#d4a520"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Vit magtröja -->
  <path d="M20 100 Q22 76 44 73 L44 80 Q50 83 56 80 L56 73 Q78 76 80 100 Z" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Magtröja detaljer (liten cutout) -->
  <path d="M44 73 Q50 77 56 73" stroke="#d1d5db" stroke-width="1" fill="none"/>
  <!-- Magen syns lite (skin) -->
  <path d="M44 80 Q50 84 56 80 L56 76 Q50 79 44 76 Z" fill="url(#skin)"/>

  <!-- Hals -->
  <path d="M44 72 Q50 75 56 72 L55 64 Q50 66 45 64 Z" fill="url(#skin)"/>

  <!-- Huvud (lite åt vänster för att ge plats åt handen) -->
  <ellipse cx="46" cy="46" rx="19" ry="21" fill="url(#skin)"/>

  <!-- Kort blont bob-hår -->
  <!-- Baksida -->
  <ellipse cx="46" cy="31" rx="21" ry="13" fill="url(#hair)"/>
  <!-- Vänster sida (bob, stopp vid käklinjen) -->
  <path d="M27 40 C25 36 26 30 29 32 C28 37 28 48 30 56 C30 60 33 62 35 60 C33 55 29 48 27 40 Z" fill="url(#hair)"/>
  <!-- Höger sida -->
  <path d="M65 40 C67 36 66 30 63 32 C64 37 64 48 62 56 C62 60 59 62 57 60 C59 55 63 48 65 40 Z" fill="url(#hair)"/>
  <!-- Framsida/lugg (sveper lite åt sidan) -->
  <path d="M27 38 C30 26 40 22 46 23 C52 22 62 26 65 36 C60 30 52 28 46 28 C40 28 32 30 27 38 Z" fill="url(#hair)"/>
  <!-- Lugg som sveper åt höger -->
  <path d="M30 30 C36 24 48 23 56 27 C48 24 36 26 30 30 Z" fill="#e8d055" opacity="0.7"/>
  <!-- Hårglans -->
  <path d="M33 26 C38 22 50 21 58 25" stroke="#f9f0a0" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round"/>

  <!-- SMINK -->
  <!-- Eyeliner/cat-eye vänster -->
  <path d="M31 43 C33 41 37 40 41 41 C38 40 33 40 30 42 Z" fill="#1a1a1a"/>
  <path d="M41 41 C43 40 44 40 45 41" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <!-- Wing vänster -->
  <path d="M30 42 C28 40 27 38 29 38 C30 39 30 41 31 43 Z" fill="#1a1a1a"/>
  <!-- Fransar vänster -->
  <line x1="31" y1="42" x2="29" y2="39" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="33" y1="41" x2="32" y2="38" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="35" y1="40.5" x2="35" y2="37.5" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="38" y1="40.5" x2="38" y2="37.5" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="41" y1="41" x2="42" y2="38" stroke="#1a1a1a" stroke-width="0.8"/>

  <!-- Eyeliner/cat-eye höger -->
  <path d="M51 43 C53 41 57 40 61 41 C58 40 53 40 50 42 Z" fill="#1a1a1a"/>
  <path d="M51 41 C53 40 54 40 55 41" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <!-- Wing höger -->
  <path d="M61 41 C63 39 64 38 63 38 C62 39 62 40 61 42 Z" fill="#1a1a1a"/>
  <!-- Fransar höger -->
  <line x1="51" y1="42" x2="50" y2="39" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="53" y1="41" x2="52" y2="38" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="55" y1="40.5" x2="55" y2="37.5" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="58" y1="40.5" x2="58" y2="37.5" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="61" y1="41" x2="62" y2="38" stroke="#1a1a1a" stroke-width="0.8"/>

  <!-- Ögon (iris) -->
  <ellipse cx="36" cy="44" rx="4" ry="3.5" fill="white"/>
  <circle cx="36" cy="44" r="2.5" fill="#5b8dd9"/>
  <circle cx="36" cy="44" r="1.4" fill="#1a2a4a"/>
  <circle cx="37" cy="43" r="0.7" fill="white"/>

  <ellipse cx="56" cy="44" rx="4" ry="3.5" fill="white"/>
  <circle cx="56" cy="44" r="2.5" fill="#5b8dd9"/>
  <circle cx="56" cy="44" r="1.4" fill="#1a2a4a"/>
  <circle cx="57" cy="43" r="0.7" fill="white"/>

  <!-- Ögonbryn (väldefinierade, lite tjocka) -->
  <path d="M30 39 C33 37 38 37 41 39" stroke="#b8860b" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M51 39 C54 37 59 37 62 39" stroke="#b8860b" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="28" cy="50" rx="6" ry="4" fill="#f9a8d4" opacity="0.4"/>
  <ellipse cx="64" cy="50" rx="6" ry="4" fill="#f9a8d4" opacity="0.4"/>

  <!-- Näsa -->
  <path d="M44 52 C45 54 47 54 48 52" stroke="#d4895a" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Glansiga läppar -->
  <path d="M38 59 C40 57 44 56.5 46 57.5 C48 56.5 52 57 54 59 C52 62 49 63 46 62.5 C43 63 40 62 38 59 Z" fill="#f472b6"/>
  <path d="M38 59 C42 58 50 58 54 59" stroke="#db2777" stroke-width="0.6" fill="none"/>
  <path d="M40 58 C43 57 49 57 52 58" stroke="white" stroke-width="0.8" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- HAND med slay/peace-tecken ✌️ -->
  <!-- Handlov/handled -->
  <path d="M72 78 C70 72 69 66 70 60 L76 60 C77 66 76 72 74 78 Z" fill="url(#skin)" stroke="#d4895a" stroke-width="0.4"/>
  <!-- Knutna fingrar (ring, lillfinger, tumme) -->
  <path d="M70 60 C69 57 69 54 71 53 C73 52 74 53 74 55 C74 57 73 59 73 60 Z" fill="url(#skin)" stroke="#d4895a" stroke-width="0.4"/>
  <!-- Tumme tucked -->
  <path d="M70 62 C67 62 65 61 65 59 C65 57 67 57 68 58 Z" fill="url(#skin)" stroke="#d4895a" stroke-width="0.4"/>

  <!-- Pekfinger (upp och lite vänster) -->
  <path d="M70 57 C70 50 69 42 70 35 C70.5 32 73 31.5 74 34 C75 40 74 50 73 57 Z" fill="url(#skin)" stroke="#d4895a" stroke-width="0.4"/>
  <!-- Pekfinger nagel (french: naturlig med vit spets) -->
  <path d="M70.5 36 Q70 32.5 72 31.5 Q74 31 74.5 34 L74 36.5 Q72 37.5 70.5 36 Z" fill="#fef3c7"/>
  <path d="M70.5 35 Q72 33.5 74 34" stroke="white" stroke-width="1.2" fill="none" opacity="0.9" stroke-linecap="round"/>

  <!-- Långfinger (upp) -->
  <path d="M74 57 C74 49 74 40 75 33 C75.5 30 78 29.5 79 32 C80 38 79 49 78 57 Z" fill="url(#skin)" stroke="#d4895a" stroke-width="0.4"/>
  <!-- Långfinger nagel (french) -->
  <path d="M75 34 Q74.5 30.5 77 29.5 Q79 29 79.5 32 L79 34.5 Q77 35.5 75 34 Z" fill="#fef3c7"/>
  <path d="M75.5 33 Q77 31.5 79 32" stroke="white" stroke-width="1.2" fill="none" opacity="0.9" stroke-linecap="round"/>

  <!-- Namnbricka -->
  <rect x="28" y="84" width="34" height="12" rx="6" fill="#f472b6"/>
  <text x="45" y="93.5" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="sans-serif">Liv</text>
</svg>
