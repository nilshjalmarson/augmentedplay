<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </radialGradient>
  </defs>

  <!-- Bakgrund -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Massagebänk -->
  <rect x="10" y="62" width="80" height="10" rx="5" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="18" y="72" width="6" height="12" rx="3" fill="#c7d2fe"/>
  <rect x="76" y="72" width="6" height="12" rx="3" fill="#c7d2fe"/>

  <!-- Kropp (killen som ligger) -->
  <rect x="18" y="52" width="55" height="13" rx="6" fill="url(#skin)"/>
  <!-- Arm längs kroppen -->
  <ellipse cx="75" cy="60" rx="8" ry="4" fill="url(#skin)"/>

  <!-- Huvud (vänt åt sidan) -->
  <ellipse cx="16" cy="55" rx="10" ry="9" fill="url(#skin)" stroke="#fbbf24" stroke-width="1"/>
  <!-- Kort hår -->
  <ellipse cx="16" cy="47" rx="10" ry="6" fill="#292524"/>
  <ellipse cx="8" cy="52" rx="5" ry="6" fill="#292524"/>
  <!-- Öga (stängt, sover) -->
  <path d="M11 55 Q14 57 17 55" stroke="#a16207" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Mun (lite öppen, sover) -->
  <path d="M10 59 Q13 61 16 59" stroke="#f97316" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ZZZ från munnen -->
  <text x="20" y="57" font-size="9" fill="white" font-weight="bold" opacity="0.95">z</text>
  <text x="27" y="50" font-size="11" fill="white" font-weight="bold" opacity="0.9">z</text>
  <text x="36" y="42" font-size="14" fill="white" font-weight="bold" opacity="0.85">z</text>
  <text x="47" y="33" font-size="16" fill="white" font-weight="bold" opacity="0.75">Z</text>

  <!-- Massörhänder -->
  <!-- Vänster hand -->
  <ellipse cx="40" cy="50" rx="8" ry="5" fill="#f9a8d4" transform="rotate(-15 40 50)"/>
  <rect x="35" y="43" width="4" height="8" rx="2" fill="#f9a8d4" transform="rotate(-15 37 47)"/>
  <rect x="40" y="42" width="4" height="8" rx="2" fill="#f9a8d4" transform="rotate(-15 42 46)"/>
  <rect x="45" y="43" width="4" height="7" rx="2" fill="#f9a8d4" transform="rotate(-15 47 47)"/>
  <!-- Höger hand -->
  <ellipse cx="58" cy="50" rx="8" ry="5" fill="#c084fc" transform="rotate(-15 58 50)"/>
  <rect x="53" y="43" width="4" height="8" rx="2" fill="#c084fc" transform="rotate(-15 55 47)"/>
  <rect x="58" y="42" width="4" height="8" rx="2" fill="#c084fc" transform="rotate(-15 60 46)"/>
  <rect x="63" y="43" width="4" height="7" rx="2" fill="#c084fc" transform="rotate(-15 65 47)"/>

  <!-- Stjärnor -->
  <text x="74" y="20" font-size="10">✨</text>
</svg>