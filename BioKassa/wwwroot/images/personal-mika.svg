<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </radialGradient>
  </defs>
  <!-- Bakgrund -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Kropp (lila spa-rock) -->
  <path d="M22 100 Q22 70 50 68 Q78 70 78 100 Z" fill="#e9d5ff" stroke="#c084fc" stroke-width="1"/>
  <!-- Krage -->
  <path d="M42 68 Q50 74 58 68" stroke="#a855f7" stroke-width="2" fill="none"/>
  <!-- Huvud -->
  <ellipse cx="50" cy="48" rx="20" ry="22" fill="url(#skin)"/>
  <!-- Hår (stiligt, asymmetriskt) -->
  <ellipse cx="50" cy="29" rx="22" ry="14" fill="#7c3aed"/>
  <!-- Sidoblock vänster (nedåt) -->
  <rect x="28" y="27" width="11" height="22" rx="5" fill="#7c3aed"/>
  <!-- Topp-slingor -->
  <path d="M34 22 Q40 10 50 18 Q60 10 66 22 Q58 16 50 20 Q42 16 34 22 Z" fill="#a855f7"/>
  <!-- Highlights -->
  <path d="M38 16 Q42 8 50 14" stroke="#e879f9" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M55 12 Q62 8 64 18" stroke="#e879f9" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ögon (coola) -->
  <ellipse cx="43" cy="47" rx="3.5" ry="3" fill="#1e1b4b"/>
  <ellipse cx="57" cy="47" rx="3.5" ry="3" fill="#1e1b4b"/>
  <circle cx="44" cy="46" r="1.2" fill="white"/>
  <circle cx="58" cy="46" r="1.2" fill="white"/>
  <!-- Glasögon (stiliga) -->
  <rect x="38" y="43" width="12" height="9" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="52" y="43" width="12" height="9" rx="4" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="50" y1="47" x2="52" y2="47" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="38" y1="47" x2="35" y2="48" stroke="#7c3aed" stroke-width="1.5"/>
  <line x1="64" y1="47" x2="67" y2="48" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Kindrosor -->
  <circle cx="37" cy="53" r="5" fill="#f9a8d4" opacity="0.45"/>
  <circle cx="63" cy="53" r="5" fill="#f9a8d4" opacity="0.45"/>
  <!-- Mun (cool smiley) -->
  <path d="M44 58 Q50 63 56 58" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Sax i handen -->
  <g transform="translate(78, 65) rotate(40)">
    <rect x="-1.5" y="-14" width="3" height="16" rx="1.5" fill="#64748b"/>
    <rect x="3" y="-14" width="3" height="16" rx="1.5" fill="#64748b"/>
    <circle cx="0" cy="-14" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
    <circle cx="4.5" cy="-14" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
  </g>
  <!-- Namn-skylt -->
  <rect x="32" y="80" width="36" height="14" rx="7" fill="#7c3aed"/>
  <text x="50" y="91" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="sans-serif">Mika</text>
</svg>