<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
    <radialGradient id="skin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#c8856a"/>
      <stop offset="100%" stop-color="#9a5c3a"/>
    </radialGradient>
    <linearGradient id="hair" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="100%" stop-color="#0c0a09"/>
    </linearGradient>
    <linearGradient id="sport" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>

  <!-- Sporttröja -->
  <path d="M18 100 Q20 73 44 70 L44 75 Q50 78 56 75 L56 70 Q80 73 82 100 Z" fill="url(#sport)"/>
  <!-- Sporttröjans detaljer (ränder på axlarna) -->
  <path d="M18 100 Q20 80 30 75 L34 78 Q24 84 22 100 Z" fill="#34d399" opacity="0.5"/>
  <path d="M82 100 Q80 80 70 75 L66 78 Q76 84 78 100 Z" fill="#34d399" opacity="0.5"/>
  <!-- Krage -->
  <path d="M43 70 Q50 74 57 70" stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Sporttröja nummer -->
  <text x="50" y="90" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold" font-family="sans-serif" opacity="0.7">7</text>

  <!-- Hals -->
  <path d="M44 69 Q50 72 56 69 L55 62 Q50 64 45 62 Z" fill="url(#skin)"/>

  <!-- Huvud -->
  <ellipse cx="50" cy="47" rx="20" ry="22" fill="url(#skin)"/>

  <!-- Hår (mörkt, hästsvans) -->
  <!-- Hår på huvud -->
  <ellipse cx="50" cy="29" rx="21" ry="13" fill="url(#hair)"/>
  <path d="M29 38 C27 33 28 27 31 29 C30 34 30 42 31 46 Z" fill="url(#hair)"/>
  <path d="M71 38 C73 33 72 27 69 29 C70 34 70 42 69 46 Z" fill="url(#hair)"/>
  <path d="M29 37 C31 26 40 22 50 23 C60 22 69 26 71 37 C65 31 55 29 50 29 C45 29 35 31 29 37 Z" fill="url(#hair)"/>

  <!-- Hästsvans (bakåt/uppåt) -->
  <!-- Hårband -->
  <ellipse cx="50" cy="23" rx="8" ry="4" fill="#10b981"/>
  <!-- Svansen (lockig/vågig, pekar uppåt och bakåt) -->
  <path d="M50 23 C54 18 60 14 62 8 C64 4 62 2 60 4 C58 6 56 10 54 14 C52 10 54 6 52 4 C50 2 48 4 50 8 C48 12 46 16 50 23 Z" fill="url(#hair)"/>
  <path d="M50 22 C46 17 40 13 38 7 C36 3 38 1 40 3 C42 5 44 9 46 13 C44 9 42 5 44 3 C46 1 48 3 46 7 C48 11 50 16 50 22 Z" fill="url(#hair)"/>

  <!-- Ögonbryn (sportig, bestämd) -->
  <path d="M32 40 C35 38 40 38 43 40" stroke="#1c1917" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M57 40 C60 38 65 38 68 40" stroke="#1c1917" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Ögon (energiska, fokuserade) -->
  <ellipse cx="37" cy="45" rx="5" ry="5" fill="white"/>
  <circle cx="37" cy="45" r="3.5" fill="#7c3aed"/>
  <circle cx="37" cy="45" r="2" fill="#1a0a3a"/>
  <circle cx="38.5" cy="43.5" r="1" fill="white"/>

  <ellipse cx="63" cy="45" rx="5" ry="5" fill="white"/>
  <circle cx="63" cy="45" r="3.5" fill="#7c3aed"/>
  <circle cx="63" cy="45" r="2" fill="#1a0a3a"/>
  <circle cx="64.5" cy="43.5" r="1" fill="white"/>

  <!-- Näsa -->
  <path d="M47 53 C48 55 52 55 53 53" stroke="#8b5a3a" stroke-width="0.9" fill="none" stroke-linecap="round"/>

  <!-- Leende (energiskt, lite sned) -->
  <path d="M38 60 C43 65 57 65 62 60 C57 67 43 67 38 60 Z" fill="#7c2d12"/>
  <path d="M38 60 C43 64 57 64 62 60 C57 63 43 63 38 60 Z" fill="white"/>
  <line x1="46" y1="60" x2="46" y2="63" stroke="#e5e7eb" stroke-width="0.7"/>
  <line x1="50" y1="60" x2="50" y2="64" stroke="#e5e7eb" stroke-width="0.7"/>
  <line x1="54" y1="60" x2="54" y2="63" stroke="#e5e7eb" stroke-width="0.7"/>

  <!-- Kindrosor (energisk röd) -->
  <ellipse cx="28" cy="51" rx="6" ry="4" fill="#f87171" opacity="0.4"/>
  <ellipse cx="72" cy="51" rx="6" ry="4" fill="#f87171" opacity="0.4"/>

  <!-- Sporttillbehör: hörlurar runt nacken -->
  <path d="M28 52 C26 58 26 64 28 68" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="28" cy="68" r="4" fill="#1c1917"/>
  <circle cx="28" cy="68" r="2.5" fill="#34d399"/>
  <path d="M72 52 C74 58 74 64 72 68" stroke="#1c1917" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="72" cy="68" r="4" fill="#1c1917"/>
  <circle cx="72" cy="68" r="2.5" fill="#34d399"/>

  <!-- Namnbricka -->
  <rect x="28" y="84" width="44" height="12" rx="6" fill="#059669"/>
  <text x="50" y="93.5" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="sans-serif">Nevin</text>
</svg>
